server:
  port: 8080

nrdc:
  capture:
    fps: 30
    interval-ms: 33
    quality: 0.6
    diff-threshold: 5
    scale-factor: 1.0
    image-format: png   # 图像编码格式: jpg（有损，带宽低）或 png（无损，画质高）
    block-size: 128       # 差分编码块大小（像素），范围 32-512
    keyframe-interval: 60 # 每 N 帧强制发送关键帧
    max-diff-ratio: 0.5   # 超过此比例块变化时退回全帧 (0.1-0.9)
  auth:
    token: nrdc-default-token
    username: admin
    password: admin
  websocket:
    endpoint: /ws
    destination-prefix: /topic
